name: ihsaa_nassim_2026
description: تطبيق إحصاء السكن الريفي 2026 — نسيم الحوضان
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'     # Dart 3.6 (Flutter 3.27)

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── قاعدة البيانات ─────────────────────────────
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── ملفات وإكسل ────────────────────────────────
  excel: ^4.0.6             # يحتاج Dart 3.5+ ✅
  file_picker: ^8.1.6       # يحتاج minSdk 23 ✅
  archive: ^3.6.1
  share_plus: ^10.1.4
  open_file: ^3.5.10

  # ── الصور ──────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # ── واجهة ورسوم ────────────────────────────────
  fl_chart: ^0.71.0         # يحتاج Dart 3.5+ ✅
  intl: ^0.19.0             # مطلوب من المستخدم ✅

  # ── مزامنة WiFi ────────────────────────────────
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  http: ^1.2.2
  shared_preferences: ^2.3.4

  # ── QR ─────────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3    # يحتاج compileSdk 35 + Java 17 ✅
  url_launcher: ^6.3.0      # فتح روابط على الويب والهاتف

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
