<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="إحصاء السكن الريفي 2026 — نسيم">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="إحصاء 2026">
  <meta name="msapplication-TileColor" content="#0D47A1">
  <meta name="theme-color" content="#0D47A1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إحصاء السكن الريفي 2026</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background-color: #0D47A1; margin: 0; }
    #loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; color: white; font-family: Arial, sans-serif;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>إحصاء السكن الريفي 2026</p>
    <p style="font-size:12px;opacity:0.7">جاري التحميل...</p>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: { serviceWorkerVersion: serviceWorkerVersion },
        onEntrypointLoaded: async function(engineInitializer) {
          let appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
          document.getElementById('loading').style.display = 'none';
        }
      });
    });
  </script>
  <script src="flutter.js" defer></script>
</body>
</html>
