name: Build — إحصاء نسيم 2026

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ══════════════════════════════════════════════
  # 1. بناء Flutter Web
  # ══════════════════════════════════════════════
  build_web:
    name: Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Web
        run: |
          flutter build web \
            --release \
            --base-href "/" \
            --no-tree-shake-icons

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: build/web/
          retention-days: 7

  # ══════════════════════════════════════════════
  # 2. بناء APK للهاتف
  # ══════════════════════════════════════════════
  build_apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --target-platform android-arm64 \
            --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

  # ══════════════════════════════════════════════
  # 3. تجميع حزمة الكمبيوتر (Windows 7)
  # ══════════════════════════════════════════════
  package_server:
    name: Server Package
    runs-on: ubuntu-latest
    needs: build_web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: server/web/

      - name: Prepare package
        run: |
          mkdir -p IhsaaServer_Win7/uploads
          cp server/app.py      IhsaaServer_Win7/
          cp server/database.py IhsaaServer_Win7/
          cp server/requirements.txt IhsaaServer_Win7/
          cp launcher.py        IhsaaServer_Win7/
          cp -r server/web/     IhsaaServer_Win7/web/

          cat > IhsaaServer_Win7/install.bat << 'BAT'
          @echo off
          echo تثبيت المكتبات...
          pip install -r requirements.txt
          echo تم التثبيت بنجاح!
          pause
          BAT

          cat > IhsaaServer_Win7/start.bat << 'BAT'
          @echo off
          python launcher.py
          BAT

          cat > IhsaaServer_Win7/README.txt << 'TXT'
          إحصاء السكن الريفي 2026
          ========================
          1. نزّل Python 3.8 من python.org
          2. شغّل install.bat مرة واحدة
          3. شغّل start.bat
          4. اضغط تشغيل السيرفر
          5. اضغط فتح في المتصفح
          كلمة المرور الافتراضية: 1234
          TXT

          zip -r IhsaaServer_Win7.zip IhsaaServer_Win7/

      - name: Upload Server Package
        uses: actions/upload-artifact@v4
        with:
          name: IhsaaServer-Win7
          path: IhsaaServer_Win7.zip
          retention-days: 30
