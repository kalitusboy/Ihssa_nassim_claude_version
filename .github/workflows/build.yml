name: Build Windows EXE with Setup Installer

on:
  push:
    branches: [ inno_setup ]
  pull_request:
    branches: [ inno_setup ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Release + Setup.exe
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create Windows platform files
        run: flutter create --platforms=windows .

      - name: Remove auto-generated test folder
        shell: pwsh
        run: |
          if (Test-Path "test") {
            Remove-Item -Recurse -Force "test"
            Write-Host "✅ Removed auto-generated test/ folder"
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Install Inno Setup (required by inno_bundle)
        shell: pwsh
        run: |
          choco install innosetup --version=6.2.2 -y
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows Release (EXE + DLLs)
        run: flutter build windows --release --no-tree-shake-icons

      - name: Create Setup.exe using inno_bundle
        run: dart run inno_bundle
        env:
          INNO_SETUP_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"

      - name: Upload Setup.exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Setup-Installer
          path: build/windows/installer/*.exe
          retention-days: 30

      - name: Compress Release folder (backup)
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "ihsaa_windows_v11_release.zip"

      - name: Upload Release folder zip (optional)
        uses: actions/upload-artifact@v4
        with:
          name: Release-Folder-Zip
          path: ihsaa_windows_v11_release.zip
          retention-days: 30
